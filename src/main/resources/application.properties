server.port=8080

# Enabling the H2-Console (local and remote)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Password for the H2-Console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# You can find your h2-console at: http://localhost:8080/h2-console/
# If you changed the server.port, you must also change it in the URL
# The credentials to log in to the h2 Driver are defined above. Be aware that the h2-console is only accessible when the server is running.

# Springwolf AsyncAPI configuration
springwolf.enabled=true
springwolf.docket.info.title=Karaokee API
springwolf.docket.info.version=1.0.0
springwolf.docket.info.description=AsyncAPI documentation for Karaokee WebSocket events
springwolf.docket.base-package=ch.uzh.ifi.hase.soprafs26
springwolf.docket.servers.stomp.protocol=stomp
springwolf.docket.servers.stomp.host=localhost:8080/ws

#For Milestone 2
